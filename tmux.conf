# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'Nybkox/tmux-ukiyo'
set -g @ukiyo-theme "kanagawa/wave"

# Terminal settings
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Launch current shell
set-option -g default-shell "${SHELL}"

# c で現在のペインと同じディレクトリに新しいウィンドウを作成する
bind c new-window -c '#{pane_current_path}'

# Set vim keybind for pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window switching and swapping
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
bind-key -n M-< swap-window -t -1
bind-key -n M-> swap-window -t +1

# Set vim keybind for pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Enable mouse mode
set -g mouse on

# Prevent automatic copy when mouse dragging ends
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# Initialize TMUX plugin manager
# Keep this line at the very bottom of tmux.conf
if-shell 'test -x ~/.tmux/plugins/tpm/tpm' \
  'run-shell ~/.tmux/plugins/tpm/tpm'